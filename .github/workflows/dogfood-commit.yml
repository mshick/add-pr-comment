name: Dogfood Commit Comments

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  dogfood-commit:
    name: Dogfood Commit Comment
    if: startsWith(github.event.head_commit.message, 'dogfood:')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version-file: '.node-version'

      - name: Install Dependencies
        run: npm ci

      - name: Build Action
        run: npm run build

      - uses: ./
        with:
          comment-target: commit
          message: 'ruff 🐶'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
